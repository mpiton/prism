query PullRequestDetail($owner: String!, $name: String!, $number: Int!) {
  repository(owner: $owner, name: $name) {
    pullRequest(number: $number) {
      id
      number
      title
      body
      author { __typename login }
      state
      isDraft
      url
      createdAt
      updatedAt
      additions
      deletions
      headRefName
      baseRefName
      repository { nameWithOwner }
      labels(first: 20) { nodes { name } }
      reviewRequests(first: 20) {
        totalCount
        nodes {
          requestedReviewer {
            __typename
            ... on User { login }
            ... on Team { name }
          }
        }
      }
      reviews(first: 50) {
        nodes {
          author { __typename login }
          state
          createdAt
        }
      }
      reviewThreads(first: 50) {
        nodes {
          isResolved
          path
          comments(first: 20) {
            nodes {
              author { __typename login }
              body
            }
          }
        }
      }
      files(first: 100) {
        nodes {
          path
          additions
          deletions
        }
      }
      commits(last: 1) {
        nodes {
          commit {
            statusCheckRollup { state }
          }
        }
      }
    }
  }
}
